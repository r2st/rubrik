# Prometheus Adapter rules — exposes the metrics that the API HPA targets
# (deploy/k8s/hpa.yaml) and the worker HPA targets (deploy/k8s/worker.yaml)
# as k8s `custom.metrics.k8s.io` and `external.metrics.k8s.io` APIs.
#
# Apply alongside the kube-prometheus-stack chart; bind via the adapter's
# Helm values: `extraArguments: ["--config=/etc/adapter/config.yaml"]`.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-adapter-config
data:
  config.yaml: |
    rules:
      # Per-pod request rate over the last minute.
      - seriesQuery: 'http_requests_total{namespace!="",pod!=""}'
        resources: { overrides: { namespace: { resource: namespace }, pod: { resource: pod } } }
        name:
          matches: "^(.*)_total$"
          as: "${1}_per_second"
        metricsQuery: |
          sum(rate(<<.Series>>{<<.LabelMatchers>>}[1m])) by (<<.GroupBy>>)

      # Per-pod p95 latency (ms).
      - seriesQuery: 'http_request_duration_seconds_bucket{namespace!="",pod!=""}'
        resources: { overrides: { namespace: { resource: namespace }, pod: { resource: pod } } }
        name:
          matches: "^http_request_duration_seconds_bucket$"
          as: "http_request_duration_p95"
        metricsQuery: |
          histogram_quantile(0.95,
            sum(rate(<<.Series>>{<<.LabelMatchers>>}[1m])) by (le, <<.GroupBy>>)
          )

    externalRules:
      # Arq queue depth — used by the worker HPA.
      - seriesQuery: 'arq_queue_jobs{queue!=""}'
        name: { as: "redis_arq_queue_depth" }
        metricsQuery: |
          max(<<.Series>>{<<.LabelMatchers>>}) by (queue)
