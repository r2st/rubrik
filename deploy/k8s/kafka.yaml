# Kafka — event backbone per ADR 0014 §"Stream".
#
# Sized against the ADR 0014 capacity envelope: ~12 MiB/s of stream
# throughput at peak → ≥24 partitions with 2× headroom. Single-region
# 3-AZ deployment via Strimzi (the recommended cloud-agnostic operator).
# In production use a managed offering (MSK / Managed Service for Apache
# Kafka / Event Hubs Kafka endpoint) — the topic + ACL + Connect
# configuration below is portable across all three.
#
# This manifest assumes the Strimzi Operator is already installed in the
# cluster (helm repo strimzi/strimzi-kafka-operator). The Operator owns
# the underlying StatefulSets, PDBs, and storage classes; we declare the
# logical Kafka cluster + the topics this service consumes/produces.
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: transcript-intel
  namespace: messaging
spec:
  kafka:
    version: 3.7.0
    replicas: 3                       # one per AZ
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2          # quorum writes — RF=3, ISR=2
      log.retention.hours: 168        # 7 days; outbox + CDC re-emit on demand
      compression.type: producer
    storage:
      type: persistent-claim
      size: 200Gi
      class: fast-ssd
    resources:
      requests: { cpu: "1",   memory: "4Gi" }
      limits:   { cpu: "4",   memory: "16Gi" }
  zookeeper:
    replicas: 3
    storage: { type: persistent-claim, size: 50Gi, class: fast-ssd }
    resources:
      requests: { cpu: "200m", memory: "1Gi" }
      limits:   { cpu: "1",    memory: "2Gi" }
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
# Outbox-relayer destination topic. Partition count matches the ADR 0014
# capacity model (24 partitions @ 12 MiB/s + 2× headroom).
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: transcript-intel.events
  namespace: messaging
  labels: { strimzi.io/cluster: transcript-intel }
spec:
  partitions: 24
  replicas: 3
  config:
    retention.ms: 604800000           # 7 days
    cleanup.policy: delete
    min.insync.replicas: 2
    compression.type: lz4
---
# Dead-letter topic for events the relayer / consumers fail to process.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: transcript-intel.events.dlq
  namespace: messaging
  labels: { strimzi.io/cluster: transcript-intel }
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 2592000000          # 30 days — operator triages then replays
    cleanup.policy: delete
    min.insync.replicas: 2
---
# Producer/consumer principal for the API + worker pods. Strimzi User
# Operator generates the credentials; pods consume them via secret mount.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: transcript-intel-app
  namespace: messaging
  labels: { strimzi.io/cluster: transcript-intel }
spec:
  authentication: { type: tls }
  authorization:
    type: simple
    acls:
      - resource: { type: topic, name: transcript-intel.events, patternType: literal }
        operations: [Read, Write, Describe]
      - resource: { type: topic, name: transcript-intel.events.dlq, patternType: literal }
        operations: [Read, Write, Describe]
      - resource: { type: group, name: transcript-intel.relayer, patternType: literal }
        operations: [Read, Describe]
      - resource: { type: group, name: transcript-intel.consumers, patternType: literal }
        operations: [Read, Describe]
