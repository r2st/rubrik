# HPA on RPS + p95 latency. CPU stays as a guardrail floor so a metrics
# pipeline outage degrades to "scale on CPU" instead of "freeze."
#
# Custom metrics (`http_requests_per_second`, `http_request_duration_p95`)
# come from the Prometheus Adapter — see deploy/k8s/prometheus-adapter-rules.yaml.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: transcript-intel-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: transcript-intel-api
  minReplicas: 3
  maxReplicas: 50
  behavior:
    scaleUp:
      # Aggressive scale-up: doubling within 60s of breaching a threshold.
      stabilizationWindowSeconds: 30
      policies:
        - { type: Percent, value: 100, periodSeconds: 60 }
        - { type: Pods,    value: 4,   periodSeconds: 60 }
      selectPolicy: Max
    scaleDown:
      # Conservative scale-down: avoid thrashing under spikey traffic.
      stabilizationWindowSeconds: 300
      policies:
        - { type: Percent, value: 50, periodSeconds: 120 }
  metrics:
    - type: Pods
      pods:
        metric: { name: http_requests_per_second }
        target: { type: AverageValue, averageValue: "200" }
    - type: Pods
      pods:
        metric: { name: http_request_duration_p95 }
        target: { type: AverageValue, averageValue: "200m" }   # 200ms
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 75 }
